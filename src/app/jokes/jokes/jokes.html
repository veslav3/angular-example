<section class="jokes" aria-label="Chuck Norris jokes">
  <div class="jokes__toolbar">
    <button
      class="jokes__fetch"
      data-testid="fetch-joke-button"
      type="button"
      [attr.aria-busy]="loading()"
      [disabled]="loading()"
      (click)="getNewJoke()"
    >
      @if (loading()) {
        Loading…
      } @else {
        Get new joke
      }
    </button>
    <button
      class="jokes__fetch jokes__timer"
      data-testid="timer-toggle-button"
      type="button"
      [attr.aria-pressed]="timerOn()"
      [attr.aria-label]="
        timerOn()
          ? 'Timer aan: elke vijf seconden wordt de oudste grap vervangen. Klik om te stoppen.'
          : 'Timer uit. Klik om elke vijf seconden automatisch een nieuwe grap toe te voegen (maximaal tien).'
      "
      (click)="toggleTimer()"
    >
      @if (timerOn()) {
        Timer uit
      } @else {
        Timer aan
      }
    </button>
  </div>

  @if (error(); as err) {
    <output class="jokes__error" data-testid="joke-error" aria-live="assertive">
      {{ err }}
    </output>
  }

  <div
    class="jokes__list-wrap"
    data-testid="joke-list"
    aria-label="Jokes you have loaded"
    aria-live="polite"
  >
    @if (jokes().length === 0) {
      @if (loading()) {
        <p class="jokes__empty" data-testid="jokes-loading">Loading jokes…</p>
      } @else {
        <p class="jokes__empty">No jokes yet. Press “Get new joke” to fetch one.</p>
      }
    } @else {
      <div class="jokes__list" role="list">
        @for (joke of jokes(); track $index) {
          <div class="jokes__item" data-testid="joke-item" role="listitem">
            <span [attr.data-joke-id]="joke.id">{{ joke.value }}</span>
          </div>
        }
      </div>
    }
  </div>
</section>

<main class="app">
  <div class="app__brand">
    <img
      class="app__logo"
      ngSrc="/images/chucknorris-logo.png"
      width="720"
      height="438"
      priority
      alt="chucknorris.io logo, Chuck Norris brand artwork"
    />
  </div>
  <h1 class="app__title">Chuck Norris jokes</h1>
  <p class="app__intro">
    Each click loads a random fact from
    <a
      class="app__link"
      href="https://api.chucknorris.io/"
      rel="noopener noreferrer"
      target="_blank"
      >api.chucknorris.io</a
    >
    and appends it to the list.
  </p>
  <app-jokes />
</main>
<router-outlet />

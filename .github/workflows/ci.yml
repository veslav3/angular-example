name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Use Node.js 24 for JavaScript-based actions (see https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  dependency-audit:
    uses: ./.github/workflows/dependency-audit.yml

  test-and-build:
    needs: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Version comes from package.json "packageManager" (do not set `version` here).
      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Use `pnpm exec ng …` so CLI flags are not prefixed with an extra `--`
      # (which breaks `ng test` / `ng build` schema validation under `pnpm run`).
      - name: Run unit tests
        run: pnpm exec ng test --watch false

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Production build
        run: pnpm exec ng build --configuration production

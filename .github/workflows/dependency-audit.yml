# Reusable dependency audit (pnpm advisory DB).
# Invoked from CI and runnable on its own via workflow_dispatch.
name: Dependency audit

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  pnpm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Version comes from package.json "packageManager" (do not set `version` here).
      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail the job on high or critical advisories (transitives included).
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
